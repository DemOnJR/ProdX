name: CI · Frontend

# ─────────────────────────────────────────────────────────────────────────────
#                              WHY THIS FILE EXISTS
# ─────────────────────────────────────────────────────────────────────────────
# Self-contained CI lifecycle for the React + Vite frontend service. Owns:
#
#     [🔍 TypeScript] ┐
#     [🔨 Vite build] ├──► [🛡️ Scan image (build + Trivy)] ──► [🚢 Publish]
#     [🔐 npm audit ] ┘                                          (main push only)
#
# Mirrors ci-backend.yml. See that file's header for the architectural
# rationale on the per-service split and the path-filter-only-on-push
# design (so branch protection status checks stay stable).
# ─────────────────────────────────────────────────────────────────────────────

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/ci-frontend.yml'
      - '.github/scripts/trivy-summary.py'
  pull_request:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/ci-frontend.yml'
      - '.github/scripts/trivy-summary.py'
    # The same "real or skip stub" pattern as backend — see
    # ci-frontend-skip.yml for the other half.

env:
  # ─── Google Artifact Registry — private Docker repo on GCP ──────────
  # See ci-backend.yml for full notes on the WIF auth model.
  IMAGE: europe-west3-docker.pkg.dev/prodx-dev2/prodx/prodx-web
  GAR_HOST: europe-west3-docker.pkg.dev
  GCP_WIF_PROVIDER: projects/328683980484/locations/global/workloadIdentityPools/github-pool/providers/github-provider
  GCP_WIF_SA: gha-prodx-publisher@prodx-dev2.iam.gserviceaccount.com

  # Local-only tag used inside the Scan job to refer to the freshly built
  # image. Never gets pushed.
  LOCAL_TAG: prodx-web:ci-scan

  # Opt every JavaScript action into Node.js 24 immediately. See ci-backend.yml.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

  # Suppress docker/build-push-action's default outputs. See ci-backend.yml
  # for full notes on what these do.
  DOCKER_BUILD_RECORD_UPLOAD: "false"
  DOCKER_BUILD_SUMMARY: "false"

jobs:
  # ════════════════════════════════════════════════════════════════════
  # Quality — 3 jobs run in parallel
  # ════════════════════════════════════════════════════════════════════

  typecheck:
    name: 🔍 Frontend · TypeScript
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - name: Checkout source
        uses: actions/checkout@v6

      - name: Set up Node 22
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: tsc --noEmit
        id: tsc
        run: npx tsc --noEmit

      - name: Summary
        if: always()
        working-directory: ${{ github.workspace }}
        run: |
          {
            echo "### 🔍 Frontend · TypeScript"
            echo "| Step | Result |"
            echo "|------|--------|"
            echo "| tsc --noEmit | ${{ steps.tsc.outcome }} |"
          } >> "$GITHUB_STEP_SUMMARY"

  vite:
    name: 🔨 Frontend · Vite build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - name: Checkout source
        uses: actions/checkout@v6

      - name: Set up Node 22
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: vite build (production)
        id: build
        run: npm run build

      - name: Summary
        if: always()
        working-directory: ${{ github.workspace }}
        run: |
          {
            echo "### 🔨 Frontend · Vite build"
            echo "| Step | Result |"
            echo "|------|--------|"
            echo "| npm run build | ${{ steps.build.outcome }} |"
          } >> "$GITHUB_STEP_SUMMARY"

  audit:
    name: 🔐 Frontend · Audit deps
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - name: Checkout source
        uses: actions/checkout@v6

      - name: Set up Node 22
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies (silent — audit is a separate step)
        run: npm install --no-audit --no-fund

      - name: npm audit (CRITICAL threshold)
        id: audit
        
        # --audit-level=critical: fail only on CRITICAL advisories (matches
        # the Trivy image scan threshold; raise to 'high' for stricter).
        run: npm audit --audit-level=critical

      - name: Summary
        if: always()
        working-directory: ${{ github.workspace }}
        run: |
          {
            echo "### 🔐 Frontend · Audit deps"
            echo "| Step | Result |"
            echo "|------|--------|"
            echo "| npm audit --audit-level=critical | ${{ steps.audit.outcome }} |"
          } >> "$GITHUB_STEP_SUMMARY"

  # ════════════════════════════════════════════════════════════════════
  # Scan — Build the image in-place + Trivy in one job. See ci-backend.yml
  # for the rationale on merging the old Build+Scan pair.
  # ════════════════════════════════════════════════════════════════════

  scan:
    name: 🛡️ Frontend · Scan image
    runs-on: ubuntu-latest
    needs: [typecheck, vite, audit]
    permissions:
      contents: read
    steps:
      - name: Checkout source
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build image (load into local docker + populate cache for Publish)
        id: build
        uses: docker/build-push-action@v7
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          load: true
          tags: ${{ env.LOCAL_TAG }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

      - name: Trivy scan (full, all severities, JSON)
        id: scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.LOCAL_TAG }}
          exit-code: '0'
          format: json
          vuln-type: 'os,library'
          output: frontend-trivy.json

      - name: Parse Trivy + write rich summary + apply gate
        id: gate
        if: always() && steps.scan.outcome != 'skipped'
        run: python3 .github/scripts/trivy-summary.py frontend-trivy.json ${{ env.IMAGE }}:ci-scan

  # ════════════════════════════════════════════════════════════════════
  # Publish — only on main push, never on PRs
  # ════════════════════════════════════════════════════════════════════

  publish:
    name: 🚢 Frontend · Publish to GAR
    runs-on: ubuntu-latest
    needs: scan
    if: github.event_name != 'pull_request'
    permissions:
      contents: read
      # id-token: write is required for the runner to request its short-lived
      # OIDC token from GitHub's issuer. See ci-backend.yml for full notes.
      id-token: write
    steps:
      - name: Checkout source
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Auth to Google Cloud (Workload Identity Federation)
        id: auth-gcp
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ env.GCP_WIF_PROVIDER }}
          service_account: ${{ env.GCP_WIF_SA }}

      - name: Configure docker for GAR
        run: gcloud auth configure-docker ${{ env.GAR_HOST }} --quiet

      - name: Compute image tags
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build & push prodx-web
        id: push
        uses: docker/build-push-action@v7
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=frontend

      - name: Publish summary
        if: always()
        run: |
          {
            echo "### 🚢 Frontend · Publish to GAR"
            echo ""
            echo "| Step | Result |"
            echo "|------|--------|"
            echo "| GCP auth (WIF, no static key) | ${{ steps.auth-gcp.outcome }} |"
            echo "| Push \`${{ env.IMAGE }}\` | ${{ steps.push.outcome }} |"
          } >> "$GITHUB_STEP_SUMMARY"
