name: CI · Frontend

# Single-job pipeline for the React + Vite frontend. Mirrors ci-backend.yml.
# See that file for the full rationale on the one-job shape and the skip-stub
# / branch-protection arrangement.

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/ci-frontend.yml'
      - '.github/scripts/trivy-summary.py'
  pull_request:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/ci-frontend.yml'
      - '.github/scripts/trivy-summary.py'

env:
  IMAGE: europe-west3-docker.pkg.dev/prodx-dev2/prodx/prodx-web
  GAR_HOST: europe-west3-docker.pkg.dev
  GCP_WIF_PROVIDER: projects/328683980484/locations/global/workloadIdentityPools/github-pool/providers/github-provider
  GCP_WIF_SA: gha-prodx-publisher@prodx-dev2.iam.gserviceaccount.com
  LOCAL_TAG: prodx-web:ci-scan

  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  DOCKER_BUILD_RECORD_UPLOAD: "false"
  DOCKER_BUILD_SUMMARY: "false"

jobs:
  ci:
    name: 🛡️ Frontend · Scan image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # for WIF on publish steps (gated to push events)
    defaults:
      run:
        working-directory: ./frontend
    steps:
      # ─── Setup ──────────────────────────────────────────────────
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci --no-audit --no-fund

      # ─── Quality ────────────────────────────────────────────────
      - run: npx tsc --noEmit
      - run: npm run build
      # --audit-level=critical: fail only on CRITICAL advisories
      # (matches the Trivy image scan threshold).
      - run: npm audit --audit-level=critical

      # ─── Build + Trivy scan ─────────────────────────────────────
      - uses: docker/setup-buildx-action@v4

      - uses: docker/build-push-action@v7
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          load: true
          tags: ${{ env.LOCAL_TAG }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

      - uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.LOCAL_TAG }}
          exit-code: '0'
          format: json
          vuln-type: 'os,library'
          output: frontend-trivy.json

      - name: Parse Trivy + write summary + apply CRITICAL+fixed gate
        working-directory: ${{ github.workspace }}
        run: python3 .github/scripts/trivy-summary.py frontend-trivy.json ${{ env.IMAGE }}:ci-scan

      # ─── Publish (main push only) ───────────────────────────────
      - if: github.event_name != 'pull_request'
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ env.GCP_WIF_PROVIDER }}
          service_account: ${{ env.GCP_WIF_SA }}

      - if: github.event_name != 'pull_request'
        run: gcloud auth configure-docker ${{ env.GAR_HOST }} --quiet

      - if: github.event_name != 'pull_request'
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v7
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=frontend
