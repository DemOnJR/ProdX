name: CI · Frontend

# Single-job pipeline for the React + Vite frontend service.
# Mirrors ci-backend.yml. See that file for the full rationale on the
# push-only path filter + always-run-on-PRs design.

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/ci-frontend.yml'
  pull_request:
    branches: [main]

env:
  IMAGE: europe-west3-docker.pkg.dev/prodx-dev2/prodx/prodx-web
  GAR_HOST: europe-west3-docker.pkg.dev
  GCP_WIF_PROVIDER: projects/328683980484/locations/global/workloadIdentityPools/github-pool/providers/github-provider
  GCP_WIF_SA: gha-prodx-publisher@prodx-dev2.iam.gserviceaccount.com
  LOCAL_TAG: prodx-web:ci-scan

  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  DOCKER_BUILD_RECORD_UPLOAD: "false"
  DOCKER_BUILD_SUMMARY: "false"

jobs:
  ci:
    name: 🚀 Pipeline
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v6

      # ─── Quality (PR only — main trusts the PR's CI results) ────
      # See ci-backend.yml for rationale. Note: the Docker image build
      # step below performs its own vite build inside the Dockerfile,
      # so even though `npm run build` skips on main, the production
      # bundle is still produced + validated by the multi-stage image
      # build (and any TypeScript errors would surface there too).
      - name: 🟢 Set up Node 22
        if: github.event_name == 'pull_request'
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: 📦 Install dependencies
        if: github.event_name == 'pull_request'
        run: npm ci --no-audit --no-fund

      - name: 🔍 TypeScript  ·  tsc --noEmit
        if: github.event_name == 'pull_request'
        run: npx tsc --noEmit

      - name: 🔨 Vite build (production)
        if: github.event_name == 'pull_request'
        run: npm run build

      - name: 🔐 Audit  ·  npm audit (CRITICAL threshold)
        if: github.event_name == 'pull_request'
        run: npm audit --audit-level=critical

      # ─── Image phase (build + scan; runs on PR AND main) ───────
      # Single docker build per CI run. See ci-backend.yml for the full
      # rationale on the build-once / retag-and-push design.
      - name: 🐳 Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: 🏷️ Compute image tags + OCI labels
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: 🔨 Build image (load locally, bake OCI labels)
        uses: docker/build-push-action@v7
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          load: true
          tags: ${{ env.LOCAL_TAG }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

      - name: 🛡️ Scan image  ·  Trivy (gate on CRITICAL with fix available)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.LOCAL_TAG }}
          # Built-in gate — see ci-backend.yml for the per-input notes.
          exit-code: '1'
          severity: 'CRITICAL'
          ignore-unfixed: true
          vuln-type: 'os,library'

      # ─── Publish (main push only) ───────────────────────────────
      # Re-uses the image already in local docker. No second buildx run.
      - name: 🔑 Auth to GCP  ·  Workload Identity Federation
        if: github.event_name != 'pull_request'
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ env.GCP_WIF_PROVIDER }}
          service_account: ${{ env.GCP_WIF_SA }}

      - name: 🐳 Configure docker for GAR
        if: github.event_name != 'pull_request'
        run: gcloud auth configure-docker ${{ env.GAR_HOST }} --quiet

      # Required for kubectl to authenticate to GKE clusters. See ci-backend.yml.
      - name: 🛠️ Install gke-gcloud-auth-plugin
        if: github.event_name != 'pull_request'
        uses: google-github-actions/setup-gcloud@v3
        with:
          install_components: gke-gcloud-auth-plugin

      - name: 🚢 Tag local image + push each tag to GAR
        if: github.event_name != 'pull_request'
        shell: bash
        run: |
          while IFS= read -r tag; do
            [ -z "$tag" ] && continue
            echo "▸ docker tag ${{ env.LOCAL_TAG }} $tag"
            docker tag "${{ env.LOCAL_TAG }}" "$tag"
            echo "▸ docker push $tag"
            docker push "$tag"
          done <<< "${{ steps.meta.outputs.tags }}"

      # ─── Trigger pod rollout via WIF (no GitHub secret needed) ──
      # See ci-backend.yml for the full rationale.
      - name: 🔁 Roll deployment to pull the new :latest from GAR
        if: github.event_name != 'pull_request'
        run: |
          gcloud container clusters get-credentials prodx-dev-gke \
            --zone europe-west3-a --project prodx-dev2
          kubectl -n prodx rollout restart deployment/prodx-web
          kubectl -n prodx rollout status deployment/prodx-web --timeout=180s
