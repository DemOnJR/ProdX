name: CI · Frontend

# Single-job pipeline for the React + Vite frontend service.
# Mirrors ci-backend.yml. See that file for the full rationale on the
# push-only path filter + always-run-on-PRs design.

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/ci-frontend.yml'
  pull_request:
    branches: [main]

env:
  IMAGE: europe-west3-docker.pkg.dev/prodx-dev2/prodx/prodx-web
  GAR_HOST: europe-west3-docker.pkg.dev
  GCP_WIF_PROVIDER: projects/328683980484/locations/global/workloadIdentityPools/github-pool/providers/github-provider
  GCP_WIF_SA: gha-prodx-publisher@prodx-dev2.iam.gserviceaccount.com
  LOCAL_TAG: prodx-web:ci-scan

  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  DOCKER_BUILD_RECORD_UPLOAD: "false"
  DOCKER_BUILD_SUMMARY: "false"

jobs:
  ci:
    name: 🛡️ Frontend · Scan image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v6

      # ─── Quality (PR only — main trusts the PR's CI results) ────
      # See ci-backend.yml for rationale. Note: the Docker image build
      # step below performs its own vite build inside the Dockerfile,
      # so even though `npm run build` skips on main, the production
      # bundle is still produced + validated by the multi-stage image
      # build (and any TypeScript errors would surface there too).
      - name: 🟢 Set up Node 22
        if: github.event_name == 'pull_request'
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: 📦 Install dependencies
        if: github.event_name == 'pull_request'
        run: npm ci --no-audit --no-fund

      - name: 🔍 TypeScript  ·  tsc --noEmit
        if: github.event_name == 'pull_request'
        run: npx tsc --noEmit

      - name: 🔨 Vite build (production)
        if: github.event_name == 'pull_request'
        run: npm run build

      - name: 🔐 Audit  ·  npm audit (CRITICAL threshold)
        if: github.event_name == 'pull_request'
        run: npm audit --audit-level=critical

      # ─── Image phase (build + scan; runs on PR AND main) ───────
      # Single docker build per CI run. See ci-backend.yml for the full
      # rationale on the build-once / retag-and-push design.
      - name: 🐳 Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: 🏷️ Compute image tags + OCI labels
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: 🔨 Build image (load locally, bake OCI labels)
        uses: docker/build-push-action@v7
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          load: true
          tags: ${{ env.LOCAL_TAG }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

      - name: 🛡️ Scan image  ·  Trivy (gate on CRITICAL with fix available)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.LOCAL_TAG }}
          # Built-in gate — see ci-backend.yml for the per-input notes.
          exit-code: '1'
          severity: 'CRITICAL'
          ignore-unfixed: true
          vuln-type: 'os,library'

      # ─── Publish (main push only) ───────────────────────────────
      # Re-uses the image already in local docker. No second buildx run.
      - name: 🔑 Auth to GCP  ·  Workload Identity Federation
        if: github.event_name != 'pull_request'
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ env.GCP_WIF_PROVIDER }}
          service_account: ${{ env.GCP_WIF_SA }}

      - name: 🐳 Configure docker for GAR
        if: github.event_name != 'pull_request'
        run: gcloud auth configure-docker ${{ env.GAR_HOST }} --quiet

      - name: 🚢 Tag local image + push each tag to GAR
        if: github.event_name != 'pull_request'
        shell: bash
        run: |
          while IFS= read -r tag; do
            [ -z "$tag" ] && continue
            echo "▸ docker tag ${{ env.LOCAL_TAG }} $tag"
            docker tag "${{ env.LOCAL_TAG }}" "$tag"
            echo "▸ docker push $tag"
            docker push "$tag"
          done <<< "${{ steps.meta.outputs.tags }}"

      # ─── GitOps trigger ─────────────────────────────────────────
      # See ci-backend.yml for the full rationale. Mirror of the api
      # bump, just for the web image's tag in ProdXCD.
      - name: 🔁 Bump ProdXCD web tag → trigger Argo CD reconcile
        if: github.event_name != 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.PRODXCD_PAT }}
        shell: bash
        run: |
          set -euo pipefail
          NEW_TAG="sha-${GITHUB_SHA:0:7}"
          REPO_URL="https://x-access-token:${GH_TOKEN}@github.com/DemOnJR/ProdXCD.git"

          git clone --depth=1 "$REPO_URL" /tmp/ProdXCD
          cd /tmp/ProdXCD
          git config user.email "ci@prodx.bot"
          git config user.name  "ProdX CI"

          for attempt in 1 2 3; do
            git fetch origin main
            git reset --hard origin/main
            yq -i ".images.web.tag = \"$NEW_TAG\"" charts/prodx/values.yaml
            if git diff --quiet; then
              echo "✓ ProdXCD already at $NEW_TAG; nothing to commit"
              exit 0
            fi
            git add charts/prodx/values.yaml
            git commit -m "deploy: prodx-web → $NEW_TAG (ProdX@${GITHUB_SHA:0:7})"
            if git push origin main; then
              echo "✓ ProdXCD bumped: prodx-web → $NEW_TAG"
              echo "  Argo CD will reconcile within ~3 min."
              exit 0
            fi
            echo "Push rejected (concurrent update?), retry $attempt/3..."
            sleep 5
          done
          echo "✗ Failed to bump ProdXCD after 3 attempts" >&2
          exit 1
