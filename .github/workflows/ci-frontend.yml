name: CI · Frontend

# Single-job pipeline for the React + Vite frontend service.
# Mirrors ci-backend.yml. See that file for the full rationale on the
# push-only path filter + always-run-on-PRs design.

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/ci-frontend.yml'
  pull_request:
    branches: [main]

env:
  IMAGE: europe-west3-docker.pkg.dev/prodx-dev2/prodx/prodx-web
  GAR_HOST: europe-west3-docker.pkg.dev
  GCP_WIF_PROVIDER: projects/328683980484/locations/global/workloadIdentityPools/github-pool/providers/github-provider
  GCP_WIF_SA: gha-prodx-publisher@prodx-dev2.iam.gserviceaccount.com
  LOCAL_TAG: prodx-web:ci-scan

  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  DOCKER_BUILD_RECORD_UPLOAD: "false"
  DOCKER_BUILD_SUMMARY: "false"

jobs:
  ci:
    name: 🛡️ Frontend · Scan image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v6

      - name: 🟢 Set up Node 22
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: 📦 Install dependencies
        run: npm ci --no-audit --no-fund

      # ─── Quality ────────────────────────────────────────────────
      - name: 🔍 TypeScript  ·  tsc --noEmit
        run: npx tsc --noEmit

      - name: 🔨 Vite build (production)
        run: npm run build

      - name: 🔐 Audit  ·  npm audit (CRITICAL threshold)
        run: npm audit --audit-level=critical

      # ─── Build + Trivy scan + Publish (main push only) ──────────
      # See ci-backend.yml for the rationale on deferring image work to
      # main pushes (PRs only validate code; main builds + scans + pushes).
      - name: 🐳 Set up Docker Buildx
        if: github.event_name != 'pull_request'
        uses: docker/setup-buildx-action@v4

      - name: 🔨 Build image (local, populate cache for Publish)
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v7
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          load: true
          tags: ${{ env.LOCAL_TAG }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

      - name: 🛡️ Scan image  ·  Trivy (JSON, all severities)
        if: github.event_name != 'pull_request'
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.LOCAL_TAG }}
          exit-code: '0'
          format: json
          vuln-type: 'os,library'
          output: frontend-trivy.json

      - name: 📊 Trivy summary + CRITICAL-with-fix gate
        if: github.event_name != 'pull_request'
        working-directory: ${{ github.workspace }}
        run: python3 .github/scripts/trivy-summary.py frontend-trivy.json ${{ env.IMAGE }}:ci-scan

      - name: 🔑 Auth to GCP  ·  Workload Identity Federation
        if: github.event_name != 'pull_request'
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ env.GCP_WIF_PROVIDER }}
          service_account: ${{ env.GCP_WIF_SA }}

      - name: 🐳 Configure docker for GAR
        if: github.event_name != 'pull_request'
        run: gcloud auth configure-docker ${{ env.GAR_HOST }} --quiet

      - name: 🏷️ Compute image tags
        if: github.event_name != 'pull_request'
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: 🚢 Push to Artifact Registry
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v7
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=frontend
