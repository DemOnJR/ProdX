name: CI · Backend

# Single-job pipeline for the FastAPI backend service.
#
# Path filter on PUSH only:
#   - Push to main with no backend/** changes → workflow doesn't run
#     (only the changed service republishes its image to GAR).
#   - PR to main → always runs (no PR path filter), so the required
#     "🛡️ Backend · Scan image" branch-protection check is always posted.
#     ~2 minutes of "wasted" CI on a frontend-only PR is the price of
#     not needing a separate skip-stub workflow file.
#
# Branch protection: job name "🛡️ Backend · Scan image" matches the
# required-checks rule on `main`.

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/ci-backend.yml'
  pull_request:
    branches: [main]

env:
  # GAR repo + WIF wiring (from ProdXTF: `terraform output`).
  # NOT secrets — security is enforced server-side by the WIF provider's
  # attribute_condition. See ProdXTF/modules/registry/main.tf.
  IMAGE: europe-west3-docker.pkg.dev/prodx-dev2/prodx/prodx-api
  GAR_HOST: europe-west3-docker.pkg.dev
  GCP_WIF_PROVIDER: projects/328683980484/locations/global/workloadIdentityPools/github-pool/providers/github-provider
  GCP_WIF_SA: gha-prodx-publisher@prodx-dev2.iam.gserviceaccount.com
  LOCAL_TAG: prodx-api:ci-scan     # local-only docker tag; never pushed

  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"   # opt-in to Node 24 for JS actions
  DOCKER_BUILD_RECORD_UPLOAD: "false"          # no .dockerbuild artifacts
  DOCKER_BUILD_SUMMARY: "false"                # no buildx summary table

jobs:
  ci:
    name: 🛡️ Backend · Scan image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # for WIF on publish steps (gated to push events)
    defaults:
      run:
        working-directory: ./backend
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v6

      # ─── Quality (PR only — main trusts the PR's CI results) ────
      # Branch protection makes the PR's lint/test/audit a hard gate for
      # the merge button, so re-running them on main is purely defensive
      # against branch-protection bypass (which the .claude hook + repo
      # settings already prevent). Skipping saves the setup-python +
      # `pip install -r requirements-dev.txt` overhead on every main push.
      - name: 🐍 Set up Python 3.12
        if: github.event_name == 'pull_request'
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      - name: 📦 Install dev dependencies
        if: github.event_name == 'pull_request'
        run: pip install -r requirements-dev.txt

      - name: 🔍 Lint  ·  ruff
        if: github.event_name == 'pull_request'
        run: ruff check app/ tests/

      - name: 🧪 Test  ·  pytest
        if: github.event_name == 'pull_request'
        run: pytest

      - name: 🔐 Audit  ·  pip-audit
        if: github.event_name == 'pull_request'
        run: pip-audit -r requirements.txt

      # ─── Image phase (build + scan; runs on PR AND main) ───────
      # Single docker build per CI run. Publish (further down) retags
      # the locally-built image and `docker push`es it — no second
      # buildkit invocation. Catches Dockerfile breakages + new CRITICAL
      # CVEs at PR time before bad code can merge.
      - name: 🐳 Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: 🏷️ Compute image tags + OCI labels
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: 🔨 Build image (load locally, bake OCI labels)
        uses: docker/build-push-action@v7
        with:
          context: ./backend
          file: ./backend/Dockerfile
          load: true                          # → local docker (for Trivy + push)
          tags: ${{ env.LOCAL_TAG }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: 🛡️ Scan image  ·  Trivy (gate on CRITICAL with fix available)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.LOCAL_TAG }}
          # Built-in gate replaces the old trivy-summary.py parser:
          #   - exit-code: 1  → fail this step on any matching finding
          #   - severity: CRITICAL → consider CRITICAL CVEs only
          #   - ignore-unfixed: true → ignore CVEs with no patch yet
          # Net effect: same gate (block on CRITICAL with a known fix),
          # output is Trivy's own table in the step log.
          exit-code: '1'
          severity: 'CRITICAL'
          ignore-unfixed: true
          vuln-type: 'os,library'

      # ─── Publish (main push only) ───────────────────────────────
      # Re-uses the image already loaded into local docker by the build
      # step above. `docker tag` is metadata-only (zero seconds), and
      # `docker push` uploads layers directly. No buildkit, no rebuild.
      - name: 🔑 Auth to GCP  ·  Workload Identity Federation
        if: github.event_name != 'pull_request'
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ env.GCP_WIF_PROVIDER }}
          service_account: ${{ env.GCP_WIF_SA }}

      - name: 🐳 Configure docker for GAR
        if: github.event_name != 'pull_request'
        run: gcloud auth configure-docker ${{ env.GAR_HOST }} --quiet

      - name: 🚢 Tag local image + push each tag to GAR
        if: github.event_name != 'pull_request'
        shell: bash
        run: |
          while IFS= read -r tag; do
            [ -z "$tag" ] && continue
            echo "▸ docker tag ${{ env.LOCAL_TAG }} $tag"
            docker tag "${{ env.LOCAL_TAG }}" "$tag"
            echo "▸ docker push $tag"
            docker push "$tag"
          done <<< "${{ steps.meta.outputs.tags }}"
