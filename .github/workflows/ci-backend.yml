name: CI · Backend

# Single-job pipeline for the FastAPI backend service.
#
# Path filter on PUSH only:
#   - Push to main with no backend/** changes → workflow doesn't run
#     (only the changed service republishes its image to GAR).
#   - PR to main → always runs (no PR path filter), so the required
#     "🛡️ Backend · Scan image" branch-protection check is always posted.
#     ~2 minutes of "wasted" CI on a frontend-only PR is the price of
#     not needing a separate skip-stub workflow file.
#
# Branch protection: job name "🛡️ Backend · Scan image" matches the
# required-checks rule on `main`.

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/ci-backend.yml'
      - '.github/scripts/trivy-summary.py'
  pull_request:
    branches: [main]

env:
  # GAR repo + WIF wiring (from ProdXTF: `terraform output`).
  # NOT secrets — security is enforced server-side by the WIF provider's
  # attribute_condition. See ProdXTF/modules/registry/main.tf.
  IMAGE: europe-west3-docker.pkg.dev/prodx-dev2/prodx/prodx-api
  GAR_HOST: europe-west3-docker.pkg.dev
  GCP_WIF_PROVIDER: projects/328683980484/locations/global/workloadIdentityPools/github-pool/providers/github-provider
  GCP_WIF_SA: gha-prodx-publisher@prodx-dev2.iam.gserviceaccount.com
  LOCAL_TAG: prodx-api:ci-scan     # local-only docker tag; never pushed

  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"   # opt-in to Node 24 for JS actions
  DOCKER_BUILD_RECORD_UPLOAD: "false"          # no .dockerbuild artifacts
  DOCKER_BUILD_SUMMARY: "false"                # no buildx summary table

jobs:
  ci:
    name: 🛡️ Backend · Scan image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # for WIF on publish steps (gated to push events)
    defaults:
      run:
        working-directory: ./backend
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v6

      - name: 🐍 Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      - name: 📦 Install dev dependencies
        run: pip install -r requirements-dev.txt

      # ─── Quality ────────────────────────────────────────────────
      - name: 🔍 Lint  ·  ruff
        run: ruff check app/ tests/

      - name: 🧪 Test  ·  pytest
        run: pytest

      - name: 🔐 Audit  ·  pip-audit
        run: pip-audit -r requirements.txt

      # ─── Build + Trivy scan ─────────────────────────────────────
      - name: 🐳 Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: 🔨 Build image (local, populate cache for Publish)
        uses: docker/build-push-action@v7
        with:
          context: ./backend
          file: ./backend/Dockerfile
          load: true
          tags: ${{ env.LOCAL_TAG }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: 🛡️ Scan image  ·  Trivy (JSON, all severities)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.LOCAL_TAG }}
          exit-code: '0'                       # gating happens in the next step
          format: json
          vuln-type: 'os,library'
          output: backend-trivy.json

      - name: 📊 Trivy summary + CRITICAL-with-fix gate
        working-directory: ${{ github.workspace }}
        run: python3 .github/scripts/trivy-summary.py backend-trivy.json ${{ env.IMAGE }}:ci-scan

      # ─── Publish (main push only) ───────────────────────────────
      - name: 🔑 Auth to GCP  ·  Workload Identity Federation
        if: github.event_name != 'pull_request'
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ env.GCP_WIF_PROVIDER }}
          service_account: ${{ env.GCP_WIF_SA }}

      - name: 🐳 Configure docker for GAR
        if: github.event_name != 'pull_request'
        run: gcloud auth configure-docker ${{ env.GAR_HOST }} --quiet

      - name: 🏷️ Compute image tags
        if: github.event_name != 'pull_request'
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: 🚢 Push to Artifact Registry
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v7
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=backend
