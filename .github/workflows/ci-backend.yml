name: CI · Backend

# Single-job pipeline for the FastAPI backend service.
#
# Path filter on BOTH push AND pull_request: this workflow only fires
# when backend/** (or this workflow file) changes. On frontend-only PRs
# the companion ci-backend-skip.yml runs instead — it fires on the
# inverse path filter and posts a no-op `🚀 Pipeline` check so branch
# protection's required status stays satisfied. Without the stub,
# GitHub would block any frontend-only PR forever waiting for a
# `🚀 Pipeline` check that the path filter prevents from ever posting.
#
# Branch protection: job name "🚀 Pipeline" — both ci-backend.yml (real)
# and ci-backend-skip.yml (stub) use this same job name so exactly one
# satisfies the required check per PR.
#
# workflow_dispatch: lets this pipeline be launched by hand from the
# Actions tab (or in bulk via the ci-all.yml dispatcher). A manual run
# is a FULL run — quality checks AND image build AND publish AND deploy
# — and ignores the path filters below.

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/ci-backend.yml'
  pull_request:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/ci-backend.yml'

  # Manual trigger — from the Actions tab or the ci-all.yml dispatcher.
  workflow_dispatch:

env:
  # GAR repo + WIF wiring (from ProdXTF: `terraform output`).
  # NOT secrets — security is enforced server-side by the WIF provider's
  # attribute_condition. See ProdXTF/modules/registry/main.tf.
  IMAGE: europe-west3-docker.pkg.dev/prodx-dev2/prodx/prodx-api
  GAR_HOST: europe-west3-docker.pkg.dev
  GCP_WIF_PROVIDER: projects/328683980484/locations/global/workloadIdentityPools/github-pool/providers/github-provider
  GCP_WIF_SA: gha-prodx-publisher@prodx-dev2.iam.gserviceaccount.com
  LOCAL_TAG: prodx-api:ci-scan     # local-only docker tag; never pushed

  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"   # opt-in to Node 24 for JS actions
  DOCKER_BUILD_RECORD_UPLOAD: "false"          # no .dockerbuild artifacts
  DOCKER_BUILD_SUMMARY: "false"                # no buildx summary table

jobs:
  ci:
    name: 🚀 Pipeline
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # for WIF on publish steps (push + dispatch only)
    defaults:
      run:
        working-directory: ./backend
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v6

      # ─── Quality (PR + manual dispatch — a main push skips these) ─
      # Branch protection makes the PR's lint/test/audit a hard gate for
      # the merge button, so re-running them on a main *push* is purely
      # defensive against branch-protection bypass (which the .claude
      # hook + repo settings already prevent). Skipping saves the
      # setup-python + `pip install` overhead on every main push.
      #
      # Gate is `!= 'push'`: true for pull_request AND workflow_dispatch,
      # so a manual dispatch runs the full quality suite.
      - name: 🐍 Set up Python 3.12
        if: github.event_name != 'push'
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      - name: 📦 Install dev dependencies
        if: github.event_name != 'push'
        run: pip install -r requirements-dev.txt

      - name: 🔍 Lint  ·  ruff
        if: github.event_name != 'push'
        run: ruff check app/ tests/

      - name: 🧪 Test  ·  pytest
        if: github.event_name != 'push'
        run: pytest

      - name: 🔐 Audit  ·  pip-audit
        if: github.event_name != 'push'
        run: pip-audit -r requirements.txt

      # ─── Image phase (build + scan; runs on every trigger) ─────
      # Single docker build per CI run. Publish (further down) retags
      # the locally-built image and `docker push`es it — no second
      # buildkit invocation. Catches Dockerfile breakages + new CRITICAL
      # CVEs at PR time before bad code can merge.
      - name: 🐳 Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: 🏷️ Compute image tags + OCI labels
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: 🔨 Build image (load locally, bake OCI labels)
        uses: docker/build-push-action@v7
        with:
          context: ./backend
          file: ./backend/Dockerfile
          load: true                          # → local docker (for Trivy + push)
          tags: ${{ env.LOCAL_TAG }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: 🛡️ Scan image  ·  Trivy (gate on CRITICAL with fix available)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.LOCAL_TAG }}
          # Built-in gate replaces the old trivy-summary.py parser:
          #   - exit-code: 1  → fail this step on any matching finding
          #   - severity: CRITICAL → consider CRITICAL CVEs only
          #   - ignore-unfixed: true → ignore CVEs with no patch yet
          # Net effect: same gate (block on CRITICAL with a known fix),
          # output is Trivy's own table in the step log.
          exit-code: '1'
          severity: 'CRITICAL'
          ignore-unfixed: true
          vuln-type: 'os,library'

      # ─── Publish (main push + manual dispatch) ──────────────────
      # Re-uses the image already loaded into local docker by the build
      # step above. `docker tag` is metadata-only (zero seconds), and
      # `docker push` uploads layers directly. No buildkit, no rebuild.
      - name: 🔑 Auth to GCP  ·  Workload Identity Federation
        if: github.event_name != 'pull_request'
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ env.GCP_WIF_PROVIDER }}
          service_account: ${{ env.GCP_WIF_SA }}

      - name: 🐳 Configure docker for GAR
        if: github.event_name != 'pull_request'
        run: gcloud auth configure-docker ${{ env.GAR_HOST }} --quiet

      # Required for kubectl to authenticate to GKE clusters since GKE 1.26
      # (Google moved auth out of gcloud into a separate plugin). The runner's
      # preinstalled gcloud is snap-installed on ubuntu-24.04 so the Google
      # Cloud apt repo isn't configured and `apt install` can't find the
      # package. setup-gcloud installs its own gcloud + the component reliably
      # across runner images (~10-15s).
      - name: 🛠️ Install gke-gcloud-auth-plugin
        if: github.event_name != 'pull_request'
        uses: google-github-actions/setup-gcloud@v3
        with:
          install_components: gke-gcloud-auth-plugin

      - name: 🚢 Tag local image + push each tag to GAR
        if: github.event_name != 'pull_request'
        shell: bash
        run: |
          while IFS= read -r tag; do
            [ -z "$tag" ] && continue
            echo "▸ docker tag ${{ env.LOCAL_TAG }} $tag"
            docker tag "${{ env.LOCAL_TAG }}" "$tag"
            echo "▸ docker push $tag"
            docker push "$tag"
          done <<< "${{ steps.meta.outputs.tags }}"

      # ─── Trigger pod rollout via WIF (no GitHub secret needed) ──
      # Reuses the GCP token already minted by the WIF auth step above:
      # gcloud `get-credentials` writes a kubeconfig, then a `kubectl
      # rollout restart` forces a rolling update on the deployment.
      # Because `imagePullPolicy: Always` is set on the Helm chart,
      # the new pods pull whatever `:latest` resolves to in GAR right
      # now — which is the image we just pushed two steps up.
      #
      # IAM: the publisher SA (gha-prodx-publisher@...) needs the
      # `roles/container.developer` role on the project. Granted in
      # ProdXTF/modules/registry/main.tf — apply ProdXTF before merging
      # this PR or the kubectl call will get a 403.
      - name: 🔁 Roll deployment to pull the new :latest from GAR
        if: github.event_name != 'pull_request'
        run: |
          gcloud container clusters get-credentials prodx-dev-gke \
            --zone europe-west3-a --project prodx-dev2
          kubectl -n prodx rollout restart deployment/prodx-api
          kubectl -n prodx rollout status deployment/prodx-api --timeout=180s
