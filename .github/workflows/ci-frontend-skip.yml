name: CI · Frontend (skip)

# Companion to ci-frontend.yml. See ci-backend-skip.yml for the full
# rationale — same pattern, inverse path filter. Job name MUST stay
# `🚀 Pipeline` (matching ci-frontend.yml) so the pair collapses into
# one required-check entry in branch protection.

on:
  pull_request:
    branches: [main]
    paths-ignore:
      - 'frontend/**'
      - '.github/workflows/ci-frontend.yml'

jobs:
  ci:
    name: 🚀 Pipeline
    runs-on: ubuntu-latest
    steps:
      - name: ⏭️ Skip (no frontend changes)
        run: echo "No frontend changes in this PR — pipeline skipped, required check satisfied."
