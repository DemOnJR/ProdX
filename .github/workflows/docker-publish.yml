name: build-test-scan-push

on:
  push:
    branches: [main]
    tags: ['v*.*.*']
  pull_request:
    branches: [main]

env:
  REGISTRY: docker.io
  API_IMAGE: pbdaemon/prodx-api
  WEB_IMAGE: pbdaemon/prodx-web

jobs:
  # ────────────────────────────────────────────────────────────────────────
  # Backend pipeline: FastAPI (Python 3.12)
  # ────────────────────────────────────────────────────────────────────────
  backend:
    name: Backend · FastAPI
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install dependencies (runtime + dev)
        working-directory: ./backend
        run: pip install -r requirements-dev.txt

      - name: Lint (ruff)
        working-directory: ./backend
        run: ruff check app/ tests/

      - name: Tests (pytest)
        working-directory: ./backend
        run: pytest

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image (local, for scan)
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          load: true
          tags: ${{ env.API_IMAGE }}:ci-scan
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Trivy scan (CRITICAL, fixed-only — fails build)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.API_IMAGE }}:ci-scan
          severity: CRITICAL
          exit-code: '1'
          ignore-unfixed: true
          format: table
          vuln-type: 'os,library'

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Tags for prodx-api image
        if: github.event_name != 'pull_request'
        id: api-meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.API_IMAGE }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Push prodx-api to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ steps.api-meta.outputs.tags }}
          labels: ${{ steps.api-meta.outputs.labels }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Job summary
        if: always()
        run: |
          {
            echo "## Backend pipeline result"
            echo ""
            echo "- **Lint:** ruff"
            echo "- **Tests:** pytest (smoke)"
            echo "- **Image:** \`${{ env.API_IMAGE }}\`"
            echo "- **Scan:** Trivy (CRITICAL, fixed-only)"
            echo "- **Push:** ${{ github.event_name == 'pull_request' && '_skipped on PR_' || '✅ pushed' }}"
          } >> "$GITHUB_STEP_SUMMARY"

  # ────────────────────────────────────────────────────────────────────────
  # Frontend pipeline: React + Vite (Node 22)
  # ────────────────────────────────────────────────────────────────────────
  frontend:
    name: Frontend · React + Vite
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          # No `cache: 'npm'` because we don't commit package-lock.json — the
          # setup-node cache requires a lockfile. Generating + committing one
          # would let us turn this back on (and use `npm ci`).

      - name: Install dependencies
        working-directory: ./frontend
        run: npm install --no-audit --no-fund

      - name: TypeScript check (tsc --noEmit)
        working-directory: ./frontend
        run: npx tsc --noEmit

      - name: Production build (vite)
        working-directory: ./frontend
        run: npm run build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build web image (local, for scan)
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          load: true
          tags: ${{ env.WEB_IMAGE }}:ci-scan
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

      - name: Trivy scan (CRITICAL, fixed-only — fails build)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.WEB_IMAGE }}:ci-scan
          severity: CRITICAL
          exit-code: '1'
          ignore-unfixed: true
          format: table
          vuln-type: 'os,library'

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Tags for prodx-web image
        if: github.event_name != 'pull_request'
        id: web-meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.WEB_IMAGE }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Push prodx-web to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ steps.web-meta.outputs.tags }}
          labels: ${{ steps.web-meta.outputs.labels }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

      - name: Job summary
        if: always()
        run: |
          {
            echo "## Frontend pipeline result"
            echo ""
            echo "- **TypeScript:** tsc --noEmit"
            echo "- **Build:** vite build"
            echo "- **Image:** \`${{ env.WEB_IMAGE }}\`"
            echo "- **Scan:** Trivy (CRITICAL, fixed-only)"
            echo "- **Push:** ${{ github.event_name == 'pull_request' && '_skipped on PR_' || '✅ pushed' }}"
          } >> "$GITHUB_STEP_SUMMARY"
