name: build-test-scan-push

on:
  push:
    branches: [main]
    tags: ['v*.*.*']
  pull_request:
    branches: [main]

env:
  REGISTRY: docker.io
  API_IMAGE: pbdaemon/prodx-api
  WEB_IMAGE: pbdaemon/prodx-web

# Two parallel jobs (Backend + Frontend), each organized into 7 phases
# with emoji-prefixed step names so the Actions UI reads as a pipeline:
#
#   📦 Setup  → 🔍 Quality  → 🔨 Build  → 🛡️ Security  → 🔐 Auth  → 🏷️ Tag  → 🚢 Release  → ✅ Summary
#
# The final ✅ Summary step prints a markdown table to GITHUB_STEP_SUMMARY
# (visible above the raw logs on the run page) with pass/fail/skip per phase.

jobs:
  # ──────────────────────────────────────────────────────────────────────
  backend:
    name: Backend · FastAPI
    runs-on: ubuntu-latest
    permissions:
      contents: read

    defaults:
      run:
        working-directory: ./backend

    steps:
      # ──── 📦 Setup ───────────────────────────────────────────────────
      - name: '📦 Checkout source'
        uses: actions/checkout@v4

      - name: '📦 Set up Python 3.12'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: backend/requirements-dev.txt

      - name: '📦 Install dependencies (runtime + dev)'
        id: install
        run: |
          pip install -r requirements-dev.txt
          echo "package_count=$(pip list --format=freeze | wc -l)" >> "$GITHUB_OUTPUT"

      # ──── 🔍 Quality ─────────────────────────────────────────────────
      - name: '🔍 Lint (ruff)'
        id: lint
        run: ruff check app/ tests/

      - name: '🔍 Tests (pytest, JUnit XML)'
        id: tests
        run: pytest --junitxml=test-results.xml

      - name: '📤 Upload test results (artifact)'
        if: always() && steps.tests.outcome != 'skipped'
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: backend/test-results.xml
          retention-days: 14

      # ──── 🔨 Build ───────────────────────────────────────────────────
      - name: '🔨 Set up Docker Buildx'
        uses: docker/setup-buildx-action@v3

      - name: '🔨 Build image (local tag, for scan)'
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          load: true
          tags: ${{ env.API_IMAGE }}:ci-scan
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      # ──── 🛡️ Security ────────────────────────────────────────────────
      - name: '🛡️ Trivy CVE scan (CRITICAL, fixed-only, fail-on-finding)'
        id: scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.API_IMAGE }}:ci-scan
          severity: CRITICAL
          exit-code: '1'
          ignore-unfixed: true
          format: table
          vuln-type: 'os,library'
          output: backend-trivy-report.txt

      - name: '📤 Upload Trivy report (artifact)'
        if: always() && steps.scan.outcome != 'skipped'
        uses: actions/upload-artifact@v4
        with:
          name: backend-trivy-report
          # Trivy writes to workspace root (action steps don't honor the
          # job's defaults.run.working-directory), so the file is here:
          path: backend-trivy-report.txt
          retention-days: 14
          if-no-files-found: warn

      # ──── 🔐 Auth (push events only) ─────────────────────────────────
      - name: '🔐 Log in to Docker Hub'
        id: login
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ──── 🏷️ Tag (push events only) ──────────────────────────────────
      - name: '🏷️ Compute image tags'
        id: meta
        if: github.event_name != 'pull_request'
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.API_IMAGE }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      # ──── 🚢 Release (push events only) ──────────────────────────────
      - name: '🚢 Push to Docker Hub'
        id: push
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      # ──── ✅ Summary (always, even on failure) ───────────────────────
      - name: '✅ Pipeline summary'
        if: always()
        working-directory: ${{ github.workspace }}
        run: |
          icon() {
            case "$1" in
              success)   echo "✅ passed" ;;
              failure)   echo "❌ failed" ;;
              skipped)   echo "⏭️ skipped (PR)" ;;
              cancelled) echo "🛑 cancelled" ;;
              *)         echo "— $1" ;;
            esac
          }
          {
            echo "## 🐍 Backend · FastAPI pipeline"
            echo ""
            echo "| Phase | Step | Result |"
            echo "|-------|------|--------|"
            echo "| 📦 Setup | Install deps (${{ steps.install.outputs.package_count || '?' }} pkgs) | $(icon '${{ steps.install.outcome }}') |"
            echo "| 🔍 Quality | Lint (ruff) | $(icon '${{ steps.lint.outcome }}') |"
            echo "| 🔍 Quality | Tests (pytest) | $(icon '${{ steps.tests.outcome }}') |"
            echo "| 🔨 Build | Docker image | $(icon '${{ steps.build.outcome }}') |"
            echo "| 🛡️ Security | Trivy CVE scan | $(icon '${{ steps.scan.outcome }}') |"
            echo "| 🔐 Auth | Docker Hub login | $(icon '${{ steps.login.outcome }}') |"
            echo "| 🏷️ Tag | Image tag metadata | $(icon '${{ steps.meta.outcome }}') |"
            echo "| 🚢 Release | Push to Docker Hub | $(icon '${{ steps.push.outcome }}') |"
            echo ""
            echo "**Image:** \`${{ env.API_IMAGE }}\`"
            echo "**Artifacts:** \`backend-test-results\` (JUnit XML), \`backend-trivy-report\` (Trivy table output)"
          } >> "$GITHUB_STEP_SUMMARY"

  # ──────────────────────────────────────────────────────────────────────
  frontend:
    name: Frontend · React + Vite
    runs-on: ubuntu-latest
    permissions:
      contents: read

    defaults:
      run:
        working-directory: ./frontend

    steps:
      # ──── 📦 Setup ───────────────────────────────────────────────────
      - name: '📦 Checkout source'
        uses: actions/checkout@v4

      - name: '📦 Set up Node 22'
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          # No `cache: 'npm'` because we don't commit package-lock.json — the
          # setup-node cache requires a lockfile. Commit one and add the cache
          # back when we have time.

      - name: '📦 Install dependencies'
        id: install
        run: |
          npm install --no-audit --no-fund
          echo "package_count=$(npm list --depth=0 --parseable 2>/dev/null | wc -l)" >> "$GITHUB_OUTPUT"

      # ──── 🔍 Quality ─────────────────────────────────────────────────
      - name: '🔍 TypeScript check (tsc --noEmit)'
        id: typecheck
        run: npx tsc --noEmit

      - name: '🔍 Production build (vite)'
        id: vitebuild
        run: npm run build

      # ──── 🔨 Build ───────────────────────────────────────────────────
      - name: '🔨 Set up Docker Buildx'
        uses: docker/setup-buildx-action@v3

      - name: '🔨 Build image (local tag, for scan)'
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          load: true
          tags: ${{ env.WEB_IMAGE }}:ci-scan
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

      # ──── 🛡️ Security ────────────────────────────────────────────────
      - name: '🛡️ Trivy CVE scan (CRITICAL, fixed-only, fail-on-finding)'
        id: scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.WEB_IMAGE }}:ci-scan
          severity: CRITICAL
          exit-code: '1'
          ignore-unfixed: true
          format: table
          vuln-type: 'os,library'
          output: frontend-trivy-report.txt

      - name: '📤 Upload Trivy report (artifact)'
        if: always() && steps.scan.outcome != 'skipped'
        uses: actions/upload-artifact@v4
        with:
          name: frontend-trivy-report
          path: frontend-trivy-report.txt
          retention-days: 14
          if-no-files-found: warn

      # ──── 🔐 Auth (push events only) ─────────────────────────────────
      - name: '🔐 Log in to Docker Hub'
        id: login
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ──── 🏷️ Tag (push events only) ──────────────────────────────────
      - name: '🏷️ Compute image tags'
        id: meta
        if: github.event_name != 'pull_request'
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.WEB_IMAGE }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      # ──── 🚢 Release (push events only) ──────────────────────────────
      - name: '🚢 Push to Docker Hub'
        id: push
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

      # ──── ✅ Summary (always, even on failure) ───────────────────────
      - name: '✅ Pipeline summary'
        if: always()
        working-directory: ${{ github.workspace }}
        run: |
          icon() {
            case "$1" in
              success)   echo "✅ passed" ;;
              failure)   echo "❌ failed" ;;
              skipped)   echo "⏭️ skipped (PR)" ;;
              cancelled) echo "🛑 cancelled" ;;
              *)         echo "— $1" ;;
            esac
          }
          {
            echo "## ⚛️ Frontend · React + Vite pipeline"
            echo ""
            echo "| Phase | Step | Result |"
            echo "|-------|------|--------|"
            echo "| 📦 Setup | Install deps | $(icon '${{ steps.install.outcome }}') |"
            echo "| 🔍 Quality | TypeScript check | $(icon '${{ steps.typecheck.outcome }}') |"
            echo "| 🔍 Quality | Vite production build | $(icon '${{ steps.vitebuild.outcome }}') |"
            echo "| 🔨 Build | Docker image | $(icon '${{ steps.build.outcome }}') |"
            echo "| 🛡️ Security | Trivy CVE scan | $(icon '${{ steps.scan.outcome }}') |"
            echo "| 🔐 Auth | Docker Hub login | $(icon '${{ steps.login.outcome }}') |"
            echo "| 🏷️ Tag | Image tag metadata | $(icon '${{ steps.meta.outcome }}') |"
            echo "| 🚢 Release | Push to Docker Hub | $(icon '${{ steps.push.outcome }}') |"
            echo ""
            echo "**Image:** \`${{ env.WEB_IMAGE }}\`"
            echo "**Artifacts:** \`frontend-trivy-report\` (Trivy table output)"
          } >> "$GITHUB_STEP_SUMMARY"
