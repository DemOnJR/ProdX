name: build-test-scan-push

on:
  push:
    branches: [main]
    tags: ['v*.*.*']
  pull_request:
    branches: [main]

env:
  REGISTRY: docker.io
  API_IMAGE: pbdaemon/prodx-api
  WEB_IMAGE: pbdaemon/prodx-web

# Pipeline visualization on the Actions canvas:
#
#   [🔍 Backend · Quality]  → [🔨 Backend · Build]  → [🛡️ Backend · Scan]   ╲
#                                                                              [🚢 Publish]
#   [🔍 Frontend · Quality] → [🔨 Frontend · Build] → [🛡️ Frontend · Scan]  ╱
#
# 7 jobs, with explicit `needs:` between phases. Each box on the canvas is one
# job. Image artifacts flow from Build → Scan via docker save / load. Publish
# rebuilds-from-cache (fast: Buildx GHA cache was populated by the Build jobs)
# and pushes both images in one place.

jobs:
  # ════════════════════════════════════════════════════════════════════
  # BACKEND PIPELINE
  # ════════════════════════════════════════════════════════════════════

  backend-quality:
    name: 🔍 Backend · Quality
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: ./backend
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install dependencies (runtime + dev)
        run: pip install -r requirements-dev.txt

      - name: Lint (ruff)
        id: lint
        run: ruff check app/ tests/

      - name: Tests (pytest, JUnit XML)
        id: tests
        run: pytest --junitxml=test-results.xml

      - name: Upload test results
        if: always() && steps.tests.outcome != 'skipped'
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: backend/test-results.xml
          retention-days: 14

      - name: Summary
        if: always()
        working-directory: ${{ github.workspace }}
        run: |
          {
            echo "### 🔍 Backend · Quality"
            echo "| Step | Result |"
            echo "|------|--------|"
            echo "| Lint (ruff)       | ${{ steps.lint.outcome }}  |"
            echo "| Tests (pytest)    | ${{ steps.tests.outcome }} |"
          } >> "$GITHUB_STEP_SUMMARY"

  backend-build:
    name: 🔨 Backend · Build
    runs-on: ubuntu-latest
    needs: backend-quality
    permissions:
      contents: read
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (load locally + populate cache)
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          load: true
          tags: ${{ env.API_IMAGE }}:ci-scan
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Save image as tarball (for the Scan job)
        if: steps.build.outcome == 'success'
        run: docker save ${{ env.API_IMAGE }}:ci-scan -o /tmp/backend-image.tar

      - name: Upload image artifact
        if: steps.build.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: backend-image
          path: /tmp/backend-image.tar
          retention-days: 1

      - name: Summary
        if: always()
        run: |
          {
            echo "### 🔨 Backend · Build"
            echo "| Step | Result |"
            echo "|------|--------|"
            echo "| Docker build  | ${{ steps.build.outcome }} |"
            echo "| Image tarball | passed to Scan job via artifact |"
          } >> "$GITHUB_STEP_SUMMARY"

  backend-scan:
    name: 🛡️ Backend · Scan
    runs-on: ubuntu-latest
    needs: backend-build
    permissions:
      contents: read
    steps:
      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: backend-image
          path: /tmp/

      - name: Load image into local docker
        run: docker load -i /tmp/backend-image.tar

      - name: Trivy CVE scan (CRITICAL, fixed-only, fail-on-finding)
        id: scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.API_IMAGE }}:ci-scan
          severity: CRITICAL
          exit-code: '1'
          ignore-unfixed: true
          format: table
          vuln-type: 'os,library'
          output: backend-trivy-report.txt

      - name: Upload Trivy report
        if: always() && steps.scan.outcome != 'skipped'
        uses: actions/upload-artifact@v4
        with:
          name: backend-trivy-report
          path: backend-trivy-report.txt
          retention-days: 14
          if-no-files-found: warn

      - name: Summary
        if: always()
        run: |
          {
            echo "### 🛡️ Backend · Scan"
            echo "| Step | Result |"
            echo "|------|--------|"
            echo "| Trivy CVE scan | ${{ steps.scan.outcome }} |"
          } >> "$GITHUB_STEP_SUMMARY"

  # ════════════════════════════════════════════════════════════════════
  # FRONTEND PIPELINE
  # ════════════════════════════════════════════════════════════════════

  frontend-quality:
    name: 🔍 Frontend · Quality
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          # No `cache: 'npm'` — see comment in earlier commits; we don't
          # commit package-lock.json so the setup-node cache can't engage.

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: TypeScript check (tsc --noEmit)
        id: typecheck
        run: npx tsc --noEmit

      - name: Production build (vite)
        id: vitebuild
        run: npm run build

      - name: Summary
        if: always()
        working-directory: ${{ github.workspace }}
        run: |
          {
            echo "### 🔍 Frontend · Quality"
            echo "| Step | Result |"
            echo "|------|--------|"
            echo "| TypeScript check   | ${{ steps.typecheck.outcome }} |"
            echo "| Vite production    | ${{ steps.vitebuild.outcome }} |"
          } >> "$GITHUB_STEP_SUMMARY"

  frontend-build:
    name: 🔨 Frontend · Build
    runs-on: ubuntu-latest
    needs: frontend-quality
    permissions:
      contents: read
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (load locally + populate cache)
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          load: true
          tags: ${{ env.WEB_IMAGE }}:ci-scan
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

      - name: Save image as tarball (for the Scan job)
        if: steps.build.outcome == 'success'
        run: docker save ${{ env.WEB_IMAGE }}:ci-scan -o /tmp/frontend-image.tar

      - name: Upload image artifact
        if: steps.build.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: frontend-image
          path: /tmp/frontend-image.tar
          retention-days: 1

      - name: Summary
        if: always()
        run: |
          {
            echo "### 🔨 Frontend · Build"
            echo "| Step | Result |"
            echo "|------|--------|"
            echo "| Docker build  | ${{ steps.build.outcome }} |"
            echo "| Image tarball | passed to Scan job via artifact |"
          } >> "$GITHUB_STEP_SUMMARY"

  frontend-scan:
    name: 🛡️ Frontend · Scan
    runs-on: ubuntu-latest
    needs: frontend-build
    permissions:
      contents: read
    steps:
      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-image
          path: /tmp/

      - name: Load image into local docker
        run: docker load -i /tmp/frontend-image.tar

      - name: Trivy CVE scan (CRITICAL, fixed-only, fail-on-finding)
        id: scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.WEB_IMAGE }}:ci-scan
          severity: CRITICAL
          exit-code: '1'
          ignore-unfixed: true
          format: table
          vuln-type: 'os,library'
          output: frontend-trivy-report.txt

      - name: Upload Trivy report
        if: always() && steps.scan.outcome != 'skipped'
        uses: actions/upload-artifact@v4
        with:
          name: frontend-trivy-report
          path: frontend-trivy-report.txt
          retention-days: 14
          if-no-files-found: warn

      - name: Summary
        if: always()
        run: |
          {
            echo "### 🛡️ Frontend · Scan"
            echo "| Step | Result |"
            echo "|------|--------|"
            echo "| Trivy CVE scan | ${{ steps.scan.outcome }} |"
          } >> "$GITHUB_STEP_SUMMARY"

  # ════════════════════════════════════════════════════════════════════
  # MERGE POINT: PUBLISH (single job that depends on every prior phase)
  # ════════════════════════════════════════════════════════════════════

  publish:
    name: 🚢 Publish to Docker Hub
    runs-on: ubuntu-latest
    needs:
      - backend-quality
      - backend-build
      - backend-scan
      - frontend-quality
      - frontend-build
      - frontend-scan
    if: github.event_name != 'pull_request'
    permissions:
      contents: read
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        id: login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ─── Backend image ───────────────────────────────────────────
      - name: Compute backend image tags
        id: meta-api
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.API_IMAGE }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build & push prodx-api
        id: push-api
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ steps.meta-api.outputs.tags }}
          labels: ${{ steps.meta-api.outputs.labels }}
          # Cache populated by the Backend · Build job — this is essentially
          # a tag-and-push from cached layers, not a real rebuild.
          cache-from: type=gha,scope=backend

      # ─── Frontend image ──────────────────────────────────────────
      - name: Compute frontend image tags
        id: meta-web
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.WEB_IMAGE }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build & push prodx-web
        id: push-web
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ steps.meta-web.outputs.tags }}
          labels: ${{ steps.meta-web.outputs.labels }}
          cache-from: type=gha,scope=frontend

      # ─── Pipeline-wide summary ───────────────────────────────────
      - name: Final pipeline summary
        if: always()
        run: |
          {
            echo "## 🚢 Publish complete"
            echo ""
            echo "Both pipelines passed Quality + Build + Scan. Images pushed:"
            echo ""
            echo "| Image | Tags |"
            echo "|-------|------|"
            echo "| \`${{ env.API_IMAGE }}\` | ${{ steps.meta-api.outputs.tags && '✅ pushed' || '❌ skipped' }} |"
            echo "| \`${{ env.WEB_IMAGE }}\` | ${{ steps.meta-web.outputs.tags && '✅ pushed' || '❌ skipped' }} |"
            echo ""
            echo "Per-phase results visible in each job's own summary."
          } >> "$GITHUB_STEP_SUMMARY"
