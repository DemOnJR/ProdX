name: build-test-scan-push

on:
  push:
    # Only main pushes (and version tags) trigger the full pipeline.
    # Dev branch pushes don't run CI on their own — they pile up on dev
    # until a PR is opened against main, at which point the pull_request
    # trigger below fires the pipeline once (and re-fires on each push
    # to dev WHILE the PR is open, via the default `synchronize` event).
    # Net effect: cheaper iteration on dev, same gating before merge.
    branches: [main]
    tags: ['v*.*.*']
  pull_request:
    branches: [main]

env:
  REGISTRY: docker.io
  API_IMAGE: pbdaemon/prodx-api
  WEB_IMAGE: pbdaemon/prodx-web
  # Opt every JavaScript action into Node.js 24 immediately. Without this,
  # GitHub prints a deprecation warning per Node-20 action invocation; from
  # June 2 2026 it'll force Node 24 anyway; Node 20 is removed Sept 16 2026.
  # See https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

# Pipeline graph rendered on the Actions canvas:
#
#   [🔍 Backend · Lint]──┐
#   [🧪 Backend · Tests] ├──→ [🔨 Backend · Build]  → [🛡️ Backend · Scan]   ╲
#   [🔐 Backend · Audit]─┘                                                      [🚢 Publish]
#   [🔍 Frontend · TS]───┐                                                     ╱
#   [🔨 Frontend · Vite] ├──→ [🔨 Frontend · Build] → [🛡️ Frontend · Scan]
#   [🔐 Frontend · Audit]┘
#
# 11 jobs total. The 3 Quality jobs per service run in parallel; Build only
# starts once they all pass. Scan runs after Build (needs the image). Publish
# converges both pipelines and only runs on push to main / tags (not PRs).
#
# Why dep audit + image scan?
# - Audit catches KNOWN-VULNERABLE packages in your requirements.txt /
#   package.json BEFORE you bake them into an image. Cheap, fast gate.
# - Image Scan (Trivy) catches OS-level CVEs in base images and any
#   transitive deps baked in. Belt + suspenders.
# - Dependabot opens PRs on a schedule for routine updates; pip-audit /
#   npm audit fire on every commit. Different roles, both useful.

jobs:
  # ════════════════════════════════════════════════════════════════════
  # BACKEND · 3 Quality jobs (parallel) → Build → Scan
  # ════════════════════════════════════════════════════════════════════

  backend-lint:
    name: 🔍 Backend · Lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: ./backend
    steps:
      - name: Checkout source
        uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install dev dependencies
        run: pip install -r requirements-dev.txt

      - name: ruff check
        id: ruff
        run: ruff check app/ tests/

      - name: Summary
        if: always()
        working-directory: ${{ github.workspace }}
        run: |
          {
            echo "### 🔍 Backend · Lint"
            echo "| Step | Result |"
            echo "|------|--------|"
            echo "| ruff check app/ tests/ | ${{ steps.ruff.outcome }} |"
          } >> "$GITHUB_STEP_SUMMARY"

  backend-tests:
    name: 🧪 Backend · Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: ./backend
    steps:
      - name: Checkout source
        uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install dev dependencies
        run: pip install -r requirements-dev.txt

      - name: pytest
        id: pytest
        run: pytest --junitxml=test-results.xml

      - name: Upload test results
        if: always() && steps.pytest.outcome != 'skipped'
        uses: actions/upload-artifact@v7
        with:
          name: backend-test-results
          path: backend/test-results.xml
          retention-days: 14

      - name: Summary
        if: always()
        working-directory: ${{ github.workspace }}
        run: |
          {
            echo "### 🧪 Backend · Tests"
            echo "| Step | Result |"
            echo "|------|--------|"
            echo "| pytest (smoke) | ${{ steps.pytest.outcome }} |"
          } >> "$GITHUB_STEP_SUMMARY"

  backend-audit:
    name: 🔐 Backend · Audit deps
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: ./backend
    steps:
      - name: Checkout source
        uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install pip-audit
        run: pip install pip-audit

      - name: pip-audit (runtime deps, full transitive tree)
        id: audit
        # Two runs: first writes JSON to a file for the artifact (|| true so
        # the human-readable run still happens even on findings); second is
        # the actual gate that fails the build on any known CVE in the
        # requirements + their transitive deps. Without --disable-pip /
        # --no-deps, pip-audit resolves the full dependency tree, which is
        # the meaningful audit (most real CVEs are in transitive deps).
        run: |
          pip-audit -r requirements.txt --format json --output audit.json || true
          pip-audit -r requirements.txt

      - name: Upload audit report
        if: always() && steps.audit.outcome != 'skipped'
        uses: actions/upload-artifact@v7
        with:
          name: backend-deps-audit
          path: backend/audit.json
          retention-days: 14
          if-no-files-found: warn

      - name: Summary
        if: always()
        working-directory: ${{ github.workspace }}
        run: |
          {
            echo "### 🔐 Backend · Audit deps"
            echo "| Step | Result |"
            echo "|------|--------|"
            echo "| pip-audit -r requirements.txt | ${{ steps.audit.outcome }} |"
          } >> "$GITHUB_STEP_SUMMARY"

  backend-build:
    name: 🔨 Backend · Build image
    runs-on: ubuntu-latest
    needs: [backend-lint, backend-tests, backend-audit]
    permissions:
      contents: read
    steps:
      - name: Checkout source
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build image (load locally + populate cache)
        id: build
        uses: docker/build-push-action@v7
        with:
          context: ./backend
          file: ./backend/Dockerfile
          load: true
          tags: ${{ env.API_IMAGE }}:ci-scan
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Save image as tarball
        if: steps.build.outcome == 'success'
        run: docker save ${{ env.API_IMAGE }}:ci-scan -o /tmp/backend-image.tar

      - name: Upload image artifact (for Scan job)
        if: steps.build.outcome == 'success'
        uses: actions/upload-artifact@v7
        with:
          name: backend-image
          path: /tmp/backend-image.tar
          retention-days: 1

      - name: Summary
        if: always()
        run: |
          {
            echo "### 🔨 Backend · Build image"
            echo "| Step | Result |"
            echo "|------|--------|"
            echo "| docker build (Buildx + GHA cache) | ${{ steps.build.outcome }} |"
          } >> "$GITHUB_STEP_SUMMARY"

  backend-scan:
    name: 🛡️ Backend · Scan image
    runs-on: ubuntu-latest
    needs: backend-build
    permissions:
      contents: read
    steps:
      - name: Checkout (for the parser script)
        uses: actions/checkout@v6

      - name: Download image artifact
        uses: actions/download-artifact@v8
        with:
          name: backend-image
          path: /tmp/

      - name: Load image into local docker
        run: docker load -i /tmp/backend-image.tar

      # Trivy in INFORMATIONAL mode: scan everything, never fail the step
      # itself. Gating + reporting happen in the next step against the JSON
      # output, so the summary can show counts across ALL severities (not
      # just the filtered CRITICAL ones the gating-only step would emit).
      - name: Trivy scan (full, all severities, JSON)
        id: scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.API_IMAGE }}:ci-scan
          exit-code: '0'
          format: json
          vuln-type: 'os,library'
          output: backend-trivy.json

      - name: Parse Trivy + write rich summary + apply gate
        id: gate
        if: always() && steps.scan.outcome != 'skipped'
        run: python3 .github/scripts/trivy-summary.py backend-trivy.json ${{ env.API_IMAGE }}:ci-scan

      - name: Upload Trivy JSON report
        if: always() && steps.scan.outcome != 'skipped'
        uses: actions/upload-artifact@v7
        with:
          name: backend-trivy-report
          path: backend-trivy.json
          retention-days: 14
          if-no-files-found: warn

  # ════════════════════════════════════════════════════════════════════
  # FRONTEND · 3 Quality jobs (parallel) → Build → Scan
  # ════════════════════════════════════════════════════════════════════

  frontend-typecheck:
    name: 🔍 Frontend · TypeScript
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - name: Checkout source
        uses: actions/checkout@v6

      - name: Set up Node 22
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: tsc --noEmit
        id: tsc
        run: npx tsc --noEmit

      - name: Summary
        if: always()
        working-directory: ${{ github.workspace }}
        run: |
          {
            echo "### 🔍 Frontend · TypeScript"
            echo "| Step | Result |"
            echo "|------|--------|"
            echo "| tsc --noEmit | ${{ steps.tsc.outcome }} |"
          } >> "$GITHUB_STEP_SUMMARY"

  frontend-vite:
    name: 🔨 Frontend · Vite build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - name: Checkout source
        uses: actions/checkout@v6

      - name: Set up Node 22
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: vite build (production)
        id: build
        run: npm run build

      - name: Summary
        if: always()
        working-directory: ${{ github.workspace }}
        run: |
          {
            echo "### 🔨 Frontend · Vite build"
            echo "| Step | Result |"
            echo "|------|--------|"
            echo "| npm run build | ${{ steps.build.outcome }} |"
          } >> "$GITHUB_STEP_SUMMARY"

  frontend-audit:
    name: 🔐 Frontend · Audit deps
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - name: Checkout source
        uses: actions/checkout@v6

      - name: Set up Node 22
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies (silent — audit is a separate step)
        run: npm install --no-audit --no-fund

      - name: npm audit (CRITICAL threshold)
        id: audit
        # JSON output to a file for the artifact + a human-readable run.
        # --audit-level=critical: fail only on CRITICAL advisories (matches
        # the Trivy image scan threshold; raise to 'high' for stricter).
        run: |
          npm audit --json > audit.json || true
          npm audit --audit-level=critical

      - name: Upload audit report
        if: always() && steps.audit.outcome != 'skipped'
        uses: actions/upload-artifact@v7
        with:
          name: frontend-deps-audit
          path: frontend/audit.json
          retention-days: 14
          if-no-files-found: warn

      - name: Summary
        if: always()
        working-directory: ${{ github.workspace }}
        run: |
          {
            echo "### 🔐 Frontend · Audit deps"
            echo "| Step | Result |"
            echo "|------|--------|"
            echo "| npm audit --audit-level=critical | ${{ steps.audit.outcome }} |"
          } >> "$GITHUB_STEP_SUMMARY"

  frontend-build:
    name: 🔨 Frontend · Build image
    runs-on: ubuntu-latest
    needs: [frontend-typecheck, frontend-vite, frontend-audit]
    permissions:
      contents: read
    steps:
      - name: Checkout source
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build image (load locally + populate cache)
        id: build
        uses: docker/build-push-action@v7
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          load: true
          tags: ${{ env.WEB_IMAGE }}:ci-scan
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

      - name: Save image as tarball
        if: steps.build.outcome == 'success'
        run: docker save ${{ env.WEB_IMAGE }}:ci-scan -o /tmp/frontend-image.tar

      - name: Upload image artifact (for Scan job)
        if: steps.build.outcome == 'success'
        uses: actions/upload-artifact@v7
        with:
          name: frontend-image
          path: /tmp/frontend-image.tar
          retention-days: 1

      - name: Summary
        if: always()
        run: |
          {
            echo "### 🔨 Frontend · Build image"
            echo "| Step | Result |"
            echo "|------|--------|"
            echo "| docker build (Buildx + GHA cache) | ${{ steps.build.outcome }} |"
          } >> "$GITHUB_STEP_SUMMARY"

  frontend-scan:
    name: 🛡️ Frontend · Scan image
    runs-on: ubuntu-latest
    needs: frontend-build
    permissions:
      contents: read
    steps:
      - name: Checkout (for the parser script)
        uses: actions/checkout@v6

      - name: Download image artifact
        uses: actions/download-artifact@v8
        with:
          name: frontend-image
          path: /tmp/

      - name: Load image into local docker
        run: docker load -i /tmp/frontend-image.tar

      - name: Trivy scan (full, all severities, JSON)
        id: scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.WEB_IMAGE }}:ci-scan
          exit-code: '0'
          format: json
          vuln-type: 'os,library'
          output: frontend-trivy.json

      - name: Parse Trivy + write rich summary + apply gate
        id: gate
        if: always() && steps.scan.outcome != 'skipped'
        run: python3 .github/scripts/trivy-summary.py frontend-trivy.json ${{ env.WEB_IMAGE }}:ci-scan

      - name: Upload Trivy JSON report
        if: always() && steps.scan.outcome != 'skipped'
        uses: actions/upload-artifact@v7
        with:
          name: frontend-trivy-report
          path: frontend-trivy.json
          retention-days: 14
          if-no-files-found: warn

  # ════════════════════════════════════════════════════════════════════
  # MERGE POINT — Publish, gated on every prior job
  # ════════════════════════════════════════════════════════════════════

  publish:
    name: 🚢 Publish to Docker Hub
    runs-on: ubuntu-latest
    # Only the two leaf jobs — backend-scan and frontend-scan transitively
    # depend on every upstream phase (their `needs:` chains back through
    # Build → Lint/Tests/Audit). Listing only the leaves keeps the Actions
    # canvas clean (one arrow per pipeline into Publish, not ten); the
    # effective gating is identical because if any upstream job fails, the
    # corresponding scan job won't run, and Publish stays blocked.
    needs: [backend-scan, frontend-scan]
    if: github.event_name != 'pull_request'
    permissions:
      contents: read
    steps:
      - name: Checkout source
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        id: login
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ─── Backend image ───────────────────────────────────────────
      - name: Compute backend image tags
        id: meta-api
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.API_IMAGE }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build & push prodx-api
        id: push-api
        uses: docker/build-push-action@v7
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ steps.meta-api.outputs.tags }}
          labels: ${{ steps.meta-api.outputs.labels }}
          # Buildx cache populated by Backend · Build — this is essentially
          # a tag-and-push from cached layers, not a real rebuild.
          cache-from: type=gha,scope=backend

      # ─── Frontend image ──────────────────────────────────────────
      - name: Compute frontend image tags
        id: meta-web
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.WEB_IMAGE }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build & push prodx-web
        id: push-web
        uses: docker/build-push-action@v7
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ steps.meta-web.outputs.tags }}
          labels: ${{ steps.meta-web.outputs.labels }}
          cache-from: type=gha,scope=frontend

      # ─── Pipeline-wide summary ───────────────────────────────────
      - name: Final pipeline summary
        if: always()
        run: |
          {
            echo "## 🚢 Publish complete"
            echo ""
            echo "Both pipelines passed Lint + Tests + Audit + Build + Scan."
            echo "Images pushed:"
            echo ""
            echo "| Image | Push |"
            echo "|-------|------|"
            echo "| \`${{ env.API_IMAGE }}\` | ${{ steps.push-api.outcome }} |"
            echo "| \`${{ env.WEB_IMAGE }}\` | ${{ steps.push-web.outcome }} |"
            echo ""
            echo "Per-phase results visible in each job's own summary above."
          } >> "$GITHUB_STEP_SUMMARY"
