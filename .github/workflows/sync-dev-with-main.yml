name: Sync dev with main

# Why this exists
# ────────────────
# Squash-merge (which we use for clean main history) collapses N commits
# from a feature branch into ONE new commit on main with a brand-new SHA.
# Git tracks commits by SHA, so even though the new commit's *content* is
# the same as the source branch's, the source branch still looks "N ahead
# and 1 behind" main forever.
#
# Manually fixing this every time means:
#     git checkout dev && git reset --hard origin/main && git push --force
#
# This workflow does it automatically. After every push to main (which in
# practice means after every squash-merge), it force-updates the `dev`
# branch ref to match main's exact tip. From now on:
#
#     git rev-list --left-right --count origin/main...origin/dev
#     0    0     ← always
#
# The first time you work on dev after a merge, just `git pull` and you've
# got the fresh state. No reset recipe to remember.
#
# Edge cases:
#   - If you have un-pushed local commits on dev when this fires, your
#     local clone will diverge from origin/dev. Standard fix: stash, pull,
#     unstash. Or just pull dev before starting any new work — that's
#     normal hygiene either way.
#   - Force-push to a branch you have a live PR open against won't break
#     the PR; GitHub re-evaluates the comparison on the next page load.

on:
  push:
    branches: [main]

permissions:
  contents: write   # required to update the dev branch ref via API

jobs:
  sync:
    name: ⤴️ Reset dev to main
    runs-on: ubuntu-latest
    steps:
      - name: Force-update dev to ${{ github.sha }}
        env:
          GH_TOKEN: ${{ github.token }}
        # GitHub's REST endpoint for ref update. force=true lets it
        # overwrite the existing dev ref regardless of ancestry — exactly
        # the destructive operation we want here.
        # See https://docs.github.com/en/rest/git/refs#update-a-reference
        run: |
          gh api \
            --method PATCH \
            /repos/${{ github.repository }}/git/refs/heads/dev \
            -f sha=${{ github.sha }} \
            -F force=true
