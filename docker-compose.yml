services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-prodx}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-prodx}
      POSTGRES_DB: ${POSTGRES_DB:-prodx}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-prodx} -d ${POSTGRES_DB:-prodx}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    restart: unless-stopped

  # Renamed from `api` to `prodx-api` so the same nginx upstream name works
  # in both Docker Compose (service-name DNS) and Kubernetes (Service DNS).
  prodx-api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: pbdaemon/prodx-api:dev
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-prodx}:${POSTGRES_PASSWORD:-prodx}@postgres:5432/${POSTGRES_DB:-prodx}
      REDIS_URL: redis://redis:6379/0
      CACHE_TTL_SECONDS: "60"
      CORS_ORIGINS: "http://localhost:8080,http://localhost:5173,http://127.0.0.1:8080,http://127.0.0.1:5173"
      # Set FORCE_SEED=true to overwrite the prodx graph from seed.py on each
      # container restart (useful when you ship graph updates). Off by default
      # so user edits via PUT /api/graphs/prodx aren't clobbered.
      FORCE_SEED: ${FORCE_SEED:-false}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  prodx-web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: pbdaemon/prodx-web:dev
    ports:
      - "8080:80"
    depends_on:
      - prodx-api
    restart: unless-stopped

volumes:
  pg_data:
